plugins {
	id "io.spring.dependency-management" version "1.0.11.RELEASE" apply false
	id "org.springframework.boot" version "2.5.6" apply false
}

subprojects {

	apply plugin: "java-library"
	apply plugin: "io.spring.dependency-management"
	if (project.name in ["pname-cmd", "pname-web"]) {
		apply plugin: "org.springframework.boot"
	}

	if (project.name == "pname-cmd") {
		springBoot { mainClassName = "cherry.pname.Main" }
	}
	if (project.name == "pname-web") {
		springBoot { mainClassName = "cherry.pname.Main" }
	}

	sourceCompatibility = 1.11
	targetCompatibility = 1.11

	compileJava.options.encoding = "UTF-8"
	compileTestJava.options.encoding = "UTF-8"

	repositories { mavenCentral() }

	dependencyManagement {
		imports { mavenBom "org.springframework.boot:spring-boot-dependencies:2.5.6" }
		dependencies {
			dependency group: "com.google.guava", name: "guava", version: "31.0.1-jre"
			dependency group: "org.apache.commons", name: "commons-csv", version: "1.9.0"
		}
	}

	dependencies {
		if (project.name == "pname-common") {
			implementation "org.springframework.boot:spring-boot-starter"
			runtimeOnly "org.springframework.boot:spring-boot-starter-aop"
			implementation "com.google.guava:guava"
			implementation "org.apache.commons:commons-lang3"
			implementation "org.apache.commons:commons-csv"
		}
		if (project.name == "pname-cmd") {
			implementation project(":pname-common")
			implementation "org.springframework.boot:spring-boot-starter"
			implementation "org.apache.commons:commons-lang3"
			implementation "org.apache.commons:commons-csv"
			compileOnly "org.springframework.boot:spring-boot-configuration-processor"
		}
		if (project.name == "pname-web") {
			implementation project(":pname-common")
			implementation "org.springframework.boot:spring-boot-starter-web"
			implementation "org.springframework.boot:spring-boot-starter-thymeleaf"
			implementation "org.apache.commons:commons-lang3"
			implementation "org.apache.commons:commons-csv"
			compileOnly "org.springframework.boot:spring-boot-configuration-processor"
		}
		testImplementation "org.springframework.boot:spring-boot-starter-test"
	}
}

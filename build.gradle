buildscript {
	ext {
		versionSpringBoot = "2.1.6.RELEASE"
		versionGuava = "28.0-jre"
		versionCommonsLang3 = "3.9"
		versionCommonsCsv = "1.7"
	}
	repositories { mavenCentral() }
	dependencies { classpath "org.springframework.boot:spring-boot-gradle-plugin:${versionSpringBoot}" }
}

subprojects {

	apply plugin: "java"
	apply plugin: "eclipse"
	apply plugin: "io.spring.dependency-management"
	if (project.name == "pname-cmd") {
		apply plugin: "org.springframework.boot"
		springBoot { mainClassName = "cherry.pname.Main" }
	}
	if (project.name == "pname-web") {
		apply plugin: "org.springframework.boot"
		springBoot { mainClassName = "cherry.pname.Main" }
	}
	if (project.name == "pname-common") {
		dependencyManagement {
			imports { mavenBom("org.springframework.boot:spring-boot-dependencies:${versionSpringBoot}") }
		}
	}

	compileJava.options.encoding = "UTF-8"
	compileTestJava.options.encoding = "UTF-8"

	repositories { mavenCentral() }

	dependencies {
		if (project.name == "pname-common") {
			implementation "org.springframework.boot:spring-boot-starter"
			runtimeOnly "org.springframework.boot:spring-boot-starter-aop"
			implementation "com.google.guava:guava:${versionGuava}"
			implementation "org.apache.commons:commons-lang3:${versionCommonsLang3}"
			implementation "org.apache.commons:commons-csv:${versionCommonsCsv}"
		}
		if (project.name == "pname-cmd") {
			implementation project(":pname-common")
			implementation "org.springframework.boot:spring-boot-starter"
			implementation "org.apache.commons:commons-lang3:${versionCommonsLang3}"
			implementation "org.apache.commons:commons-csv:${versionCommonsCsv}"
		}
		if (project.name == "pname-web") {
			implementation project(":pname-common")
			implementation "org.springframework.boot:spring-boot-starter-web"
			implementation "org.springframework.boot:spring-boot-starter-thymeleaf"
			implementation "org.apache.commons:commons-lang3:${versionCommonsLang3}"
			implementation "org.apache.commons:commons-csv:${versionCommonsCsv}"
		}
		testImplementation "org.springframework.boot:spring-boot-starter-test"
	}
}

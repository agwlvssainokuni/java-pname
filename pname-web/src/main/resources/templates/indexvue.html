<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="context-root" th:content="@{/}"/>
    <title>物理名生成</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
</head>

<body>
<div class="container">
    <h2 class="my-3">物理名生成</h2>
    <div id="pname-web">
        <div class="form-group">
            <textarea v-model="pnameln" class="form-control" rows="20" cols="40"></textarea>
        </div>
        <div class="form-group">
            <button v-on:click="convert" class="btn btn-primary" value="UPPER_SNAKE">UPPER_SNAKE</button>
            <button v-on:click="convert" class="btn btn-primary" value="LOWER_SNAKE">lower_snake</button>
            <button v-on:click="convert" class="btn btn-primary" value="UPPER_CAMEL">UpperCamel</button>
            <button v-on:click="convert" class="btn btn-primary" value="LOWER_CAMEL">lowerCamel</button>
            <button v-on:click="convert" class="btn btn-primary" value="UPPER_KEBAB">UPPER-KEBAB</button>
            <button v-on:click="convert" class="btn btn-primary" value="LOWER_KEBAB">lower-kebab</button>
        </div>
    </div>
</div>
<div class="container">
    <address class="text-center">Copyright &copy;, 2017,2025, agwlvssainokuni</address>
</div>
<script th:src="@{/javascript/indexvue.js}"></script>
</body>

</html>
